<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para la mejor novia</title>
    <style>
        body {
            background-color: #ffebf0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #d63384;
        }
        h1 { font-size: 1.5rem; margin-bottom: 20px; }
        #countdown {
            display: flex;
            gap: 15px;
        }
        .time-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            min-width: 60px;
            text-align: center;
        }
        .number { font-size: 2rem; font-weight: bold; display: block; }
        .label { font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>Faltan para nuestro aniversario:</h1>

    <div id="countdown">
        <div class="time-box"><span class="number" id="days">0</span><span class="label">Días</span></div>
        <div class="time-box"><span class="number" id="hours">0</span><span class="label">Hrs</span></div>
        <div class="time-box"><span class="number" id="minutes">0</span><span class="label">Min</span></div>
        <div class="time-box"><span class="number" id="seconds">0</span><span class="label">Seg</span></div>
    </div>

    <script>
        // CAMBIA LA FECHA AQUÍ (Año, Mes - 1, Día)
        // Ejemplo: 15 de Mayo de 2026 -> (2026, 4, 15)
        const targetDate = new Date(2026, 4, 15).getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = d;
            document.getElementById('hours').innerText = h;
            document.getElementById('minutes').innerText = m;
            document.getElementById('seconds').innerText = s;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
