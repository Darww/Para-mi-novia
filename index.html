<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi novia ❤️</title>
    <style>
        :root { --pinc: #d81b60; --bg: #fce4ec; }
        body { 
            background: linear-gradient(135deg, var(--bg) 0%, #f8bbd0 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; color: var(--pinc); text-align: center;
            overflow: hidden; position: relative;
        }
        .main-box { z-index: 100; position: relative; padding: 20px; }
        .unidad { 
            display: inline-block; margin: 8px; padding: 12px; 
            background: rgba(255, 255, 255, 0.9); border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); min-width: 60px;
        }
        span { font-size: 2rem; font-weight: bold; display: block; }
        .boton {
            background: var(--pinc); color: white; border: none;
            padding: 12px 25px; border-radius: 20px; font-size: 1.1rem;
            cursor: pointer; margin-top: 15px;
        }
        
        /* --- FÍSICA DE LOS PÉTALOS CORREGIDA --- */
        .p_anim {
            position: absolute; 
            background: #ff4081; /* Rosa Intenso */
            border-radius: 50% 0 50% 50%; /* Forma de pétalo */
            opacity: 0; /* Empiezan invisibles */
            pointer-events: none; 
            z-index: 1; /* Por detrás del texto */
            
            /* Nombre de la animación, duración por defecto, tipo de curva, dirección */
            animation-name: fall;
            animation-timing-function: linear;
            animation-fill-mode: forwards; /* Se quedan con los valores finales */
        }
        
        @keyframes fall {
            0% { 
                /* EMPIEZA: Fuera de pantalla arriba, sin rotar, invisible */
                transform: translateY(-15vh) rotate(0deg); 
                opacity: 0; 
            }
            10% {
                /* Se vuelven visibles rápido al entrar */
                opacity: 0.8;
            }
            100% { 
                /* TERMINA: Fuera de pantalla abajo, rotando 360 grados, invisible */
                transform: translateY(115vh) rotate(360deg); 
                opacity: 0; 
            }
        }
    </style>
</head>
<body>

    <div class="main-box">
        <div id="c-cnt">
            <h1>Falta poco...</h1>
            <div>
                <div class="unidad"><span id="d">0</span>Días</div>
                <div class="unidad"><span id="h">0</span>Hs</div>
                <div class="unidad"><span id="m">0</span>Min</div>
                <div class="unidad"><span id="s">0</span>Seg</div>
            </div>
        </div>

        <div id="c-fin" style="display:none;">
            <h1>¡Llegó el día especial!</h1>
            <button class="boton" onclick="show()">Abrir mi sorpresa</button>
            <div id="m-ok" style="display:none; margin-top:20px;">
                <p>Te amo mucho ❤️</p>
                <img src="https://via.placeholder.com/100" style="border-radius:50%">
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE FECHA (Mantenemos abril para probar)
        const end = new Date('April 3, 2026 00:00:00').getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const d = end - now;
            if (d <= 0) {
                document.getElementById('c-cnt').style.display = 'none';
                document.getElementById('c-fin').style.display = 'block';
            } else {
                document.getElementById('d').innerText = Math.floor(d / 864e5);
                document.getElementById('h').innerText = Math.floor((d % 864e5) / 36e5);
                document.getElementById('m').innerText = Math.floor((d % 36e5) / 6e4);
                document.getElementById('s').innerText = Math.floor((d % 6e4) / 1000);
            }
        }, 1000);

        function show() { document.getElementById('m-ok').style.display = 'block'; }

        // --- GENERADOR DE LLUVIA DE PÉTALOS CORREGIDO ---
        function rain() {
            const p = document.createElement('div');
            p.className = 'p_anim';
            
            // 1. Posición horizontal aleatoria (0 a 100% del ancho)
            p.style.left = (Math.random() * 100) + "vw";
            
            // 2. Tamaño aleatorio pero visible (entre 12 y 25px)
            const sizeValue = Math.random() * 13 + 12;
            p.style.width = sizeValue + "px";
            p.style.height = sizeValue + "px";
            
            // 3. Duración de la caída aleatoria y LENTA (entre 6 y 12 segundos)
            // Esto hace que caigan desde arriba de verdad
            const duration = (Math.random() * 6 + 6);
            p.style.animationDuration = duration + "s";
            
            // 4. Retraso aleatorio para dispersar la lluvia
            p.style.animationDelay = (Math.random() * 5) + "s";

            document.body.appendChild(p);
            
            // Importante: Eliminar el pétalo DESPUÉS de que termine su animación lenta
            // Usamos la duración máxima + el delay máximo (12 + 5 = 17s)
            setTimeout(() => p.remove(), 17000);
        }
        
        // Crear un pétalo nuevo cada 400ms para mantener una lluvia constante
        setInterval(rain, 400);
    </script>
</body>
</html>
