<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi novia ❤️</title>
    <style>
        :root { --pinc: #d81b60; --bg: #fce4ec; }
        body { 
            background: linear-gradient(135deg, var(--bg) 0%, #f8bbd0 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; color: var(--pinc); text-align: center;
            overflow: hidden; position: relative;
        }
        .main-box { z-index: 100; position: relative; padding: 20px; }
        .unidad { 
            display: inline-block; margin: 8px; padding: 12px; 
            background: rgba(255, 255, 255, 0.9); border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); min-width: 60px;
        }
        span { font-size: 2rem; font-weight: bold; display: block; }
        .boton {
            background: var(--pinc); color: white; border: none;
            padding: 12px 25px; border-radius: 20px; font-size: 1.1rem;
            cursor: pointer; margin-top: 15px;
        }
        
        /* ESTILO DE LOS PÉTALOS */
        .p_anim {
            position: absolute; background: #ff4081;
            border-radius: 50% 0 50% 50%; opacity: 0.7;
            pointer-events: none; z-index: 1;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="main-box">
        <div id="c-cnt">
            <h1>Falta poco...</h1>
            <div>
                <div class="unidad"><span id="d">0</span>Días</div>
                <div class="unidad"><span id="h">0</span>Hs</div>
                <div class="unidad"><span id="m">0</span>Min</div>
                <div class="unidad"><span id="s">0</span>Seg</div>
            </div>
        </div>

        <div id="c-fin" style="display:none;">
            <h1>¡Llegó el día especial!</h1>
            <button class="boton" onclick="show()">Abrir mi sorpresa</button>
            <div id="m-ok" style="display:none; margin-top:20px;">
                <p>Te amo mucho ❤️</p>
                <img src="https://via.placeholder.com/100" style="border-radius:50%">
            </div>
        </div>
    </div>

    <script>
        // Cambia la fecha aquí para probar el botón (ej. una fecha pasada)
        const end = new Date('April 3, 2026 00:00:00').getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const d = end - now;
            if (d <= 0) {
                document.getElementById('c-cnt').style.display = 'none';
                document.getElementById('c-fin').style.display = 'block';
            } else {
                document.getElementById('d').innerText = Math.floor(d / 864e5);
                document.getElementById('h').innerText = Math.floor((d % 864e5) / 36e5);
                document.getElementById('m').innerText = Math.floor((d % 36e5) / 6e4);
                document.getElementById('s').innerText = Math.floor((d % 6e4) / 1000);
            }
        }, 1000);

        function show() { document.getElementById('m-ok').style.display = 'block'; }

        // GENERADOR DE PÉTALOS
        function rain() {
            const p = document.createElement('div');
            p.className = 'p_anim';
            p.style.left = Math.random() * 100 + "vw";
            const size = (Math.random() * 10 + 10) + "px";
            p.style.width = size;
            p.style.height = size;
            p.style.animationDuration = (Math.random() * 3 + 4) + "s";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 7000);
        }
        setInterval(rain, 400);
    </script>
</body>
</html>
