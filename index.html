<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Mi Niña ❤️</title>
    <style>
        body {
            background-color: #ffebf0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #d63384;
            overflow-x: hidden;
            position: relative;
        }

        /* --- LLUVIA DE CORAZONES --- */
        .heart-rain {
            position: fixed;
            top: -50px;
            user-select: none;
            z-index: 0;
            pointer-events: none;
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(calc(100vh + 100px)) rotate(360deg); } }

        /* --- CONTENEDOR --- */
        .main-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(214, 51, 132, 0.15);
            text-align: center;
            z-index: 10;
            max-width: 85%;
            width: 400px;
            border: 1px solid #f8bbd0;
            backdrop-filter: blur(2px);
            margin: 20px;
        }

        h1 { font-size: 1.4rem; margin-bottom: 20px; }

        /* --- CONTADOR --- */
        #countdown { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .time-box { background: #fff0f5; padding: 8px; border-radius: 10px; min-width: 55px; border: 1px solid #f8bbd0; }
        .number { font-size: 1.6rem; font-weight: bold; color: #ad1457; display: block; }
        .label { font-size: 0.6rem; text-transform: uppercase; color: #880e4f; }

        /* --- BOTÓN --- */
        #btn-abrir {
            background-color: #d63384; 
            color: white; border: none; padding: 15px 30px;
            font-size: 1.1rem; font-weight: bold; border-radius: 50px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(214, 51, 132, 0.3);
            display: none; margin: 0 auto;
        }

        /* --- CARRUSEL DE FOTOS --- */
        #detalle-final { display: none; animation: fadeIn 1.5s; }
        .slideshow-container {
            position: relative;
            width: 100%;
            height: 250px;
            margin-bottom: 15px;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #f8bbd0;
        }
        .mySlides { display: none; width: 100%; height: 100%; object-fit: cover; }

        .frase { font-size: 1.1rem; line-height: 1.5; color: #ad1457; font-style: italic; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="pista-lluvia"></div>

    <audio id="miMusica" src="musica.mp3" loop></audio>

    <div class="main-container">
        
        <div id="seccion-contador">
            <h1>Faltan para nuestro aniversario:</h1>
            <div id="countdown">
                <div class="time-box"><span class="number" id="days">0</span><span class="label">Días</span></div>
                <div class="time-box"><span class="number" id="hours">0</span><span class="label">Hrs</span></div>
                <div class="time-box"><span class="number" id="minutes">0</span><span class="label">Min</span></div>
                <div class="time-box"><span class="number" id="seconds">0</span><span class="label">Seg</span></div>
            </div>
        </div>

        <button id="btn-abrir">Abrir mi detalle ❤️</button>

        <div id="detalle-final">
            <div class="slideshow-container">
                <img src="img/foto1.jpg" class="mySlides">
                <img src="img/foto2.jpg" class="mySlides">
                <img src="img/foto3.jpg" class="mySlides">
            </div>
            <div class="frase">
                "Dos años de momentos increíbles... <br>
                Eres lo mejor que me ha pasado. ❤️"
            </div>
        </div>

    </div>

    <script>
        // Lógica de Lluvia
        function crearCorazon() {
            const cont = document.getElementById('pista-lluvia');
            const c = document.createElement('div');
            c.classList.add('heart-rain');
            c.innerText = '❤';
            c.style.left = Math.random() * 100 + "vw";
            const dur = (Math.random() * 5 + 3) + "s";
            c.style.animationDuration = dur;
            c.style.fontSize = (Math.random() * 20 + 15) + "px";
            cont.appendChild(c);
            setTimeout(() => { c.remove(); }, parseFloat(dur) * 1000);
        }
        let lluviaInterval = setInterval(crearCorazon, 300);

        // Lógica de Contador
        const targetDate = new Date().getTime() + 5000; // MODO PRUEBA (5 seg)

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff <= 0) {
                document.getElementById('seccion-contador').style.display = 'none';
                document.getElementById('btn-abrir').style.display = 'block';
                return; 
            }
            document.getElementById('days').innerText = Math.floor(diff / 86400000);
            document.getElementById('hours').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('minutes').innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById('seconds').innerText = Math.floor((diff % 60000) / 1000);
        }
        setInterval(updateCountdown, 1000);

        // Lógica del Botón (Música + Fotos)
        document.getElementById('btn-abrir').addEventListener('click', function() {
            this.style.display = 'none';
            document.getElementById('detalle-final').style.display = 'block';
            
            // Reproducir música
            const audio = document.getElementById('miMusica');
            audio.play().catch(e => console.log("Error audio:", e));
            
            // Iniciar Carrusel
            showSlides();
            
            // Intensificar lluvia
            clearInterval(lluviaInterval);
            lluviaInterval = setInterval(crearCorazon, 80);
        });

        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("mySlides");
            for (let i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}
            slides[slideIndex-1].style.display = "block";
            setTimeout(showSlides, 3000); // Cambia foto cada 3 segundos
        }
    </script>
</body>
</html>
